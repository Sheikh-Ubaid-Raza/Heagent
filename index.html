<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Primary Meta Tags (fallback; react-helmet-async overrides these per page) -->
    <title>Heagent | AI-Powered Healthcare Automation</title>
    <meta name="description" content="Heagent automates clinical workflows, lab diagnostics, and hospital operations for healthcare providers using advanced Agentic AI. Reduce errors, save time, and focus on patient care." />

    <meta name="keywords" content="agentic AI, healthcare automation, medical AI, clinical workflows, lab diagnostics, healthcare technology, Lab Tester AI, hospital operations" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Heagent" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Heagent | AI-Powered Healthcare Automation" />
    <meta property="og:description" content="Heagent automates clinical workflows, lab diagnostics, and hospital operations for healthcare providers using advanced Agentic AI. Reduce errors, save time, and focus on patient care." />
    <meta property="og:image" content="https://www.heagent.site/logo.png" />
    <meta property="og:image:alt" content="Heagent - Healthcare AI Automation Logo" />
    <meta property="og:url" content="https://www.heagent.site" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Heagent | AI-Powered Healthcare Automation" />
    <meta name="twitter:description" content="Automating clinical workflows, lab diagnostics, and hospital operations with Agentic AI." />
    <meta name="twitter:image" content="https://www.heagent.site/logo.png" />
    <meta name="twitter:image:alt" content="Heagent - Healthcare AI Automation Logo" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.heagent.site" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Heagent",
      "url": "https://www.heagent.site",
      "logo": "https://www.heagent.site/logo.png",
      "description": "Heagent automates clinical workflows, lab diagnostics, and hospital operations for healthcare providers using advanced Agentic AI.",
      "foundingDate": "2024",
      "founders": [
        {
          "@type": "Person",
          "name": "Ubaid Raza"
        },
        {
          "@type": "Person",
          "name": "Canon Yusuf"
        }
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@heagent.site",
        "contactType": "Customer Service"
      },
      "sameAs": [
        "https://www.heagent.site"
      ]
    }
    </script>
  </body>
</html>
